version: '3.8'

services:
  opentegrate:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - OPENTEGRATE_WEB_PORT=3000
      - OPENTEGRATE_LOG_LEVEL=info
      - OPENTEGRATE_STORAGE=json
    volumes:
      - opentegrate-data:/app/data
      - opentegrate-config:/app/config
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru

volumes:
  opentegrate-data:
  opentegrate-config:
  redis-data:
